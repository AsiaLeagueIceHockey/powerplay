name: Monthly Club Ranking Instagram Story

on:
  schedule:
    # 매월 28~31일 22:00 KST (13:00 UTC) 트리거.
    # 스크립트가 KST 마지막 날인지 검사 후 진행/스킵.
    - cron: "0 13 28-31 * *"
  workflow_dispatch:
    inputs:
      target_month:
        description: "캡처할 월 (YYYY-MM, 예: 2026-04). 비워두면 KST 기준 이번 달."
        required: false
        type: string

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Club Ranking Capture Script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://powerplay.kr' }}
          TARGET_MONTH: ${{ github.event.inputs.target_month }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npx tsx scripts/capture-club-ranking.ts
