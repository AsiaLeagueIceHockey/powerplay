name: Daily Instagram Story Capture

on:
  schedule:
    # 매일 밤 11시 KST (14:00 UTC) 실행
    - cron: "0 14 * * *"
  # 수동 실행 지원
  workflow_dispatch:
    inputs:
      target_date:
        description: "캡처할 날짜 (YYYY-MM-DD 형식, 예: 2024-03-15). 비워두면 내일 날짜로 실행됩니다."
        required: false
        type: string

jobs:
  capture-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Capture Script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://powerplay.kr' }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: npx tsx scripts/capture-instagram-story.ts
